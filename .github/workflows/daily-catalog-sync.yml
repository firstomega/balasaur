name: Daily catalog sync

# Grows + refreshes the Balasaur catalog once a day. It loops the apikey-gated sync
# endpoint a handful of short passes (each ~300 titles): `bucket` rotates which
# region's major-provider catalog is pulled (9 regions → 9 passes cover them all),
# and refreshExisting lets a pass re-pull stale popular titles once new ones run out.
# So the catalog climbs toward full coverage and streaming availability stays fresh.
#
# Verify runs in the repo's Actions tab.
# Requires a GitHub repository secret named SYNC_HOOK_SECRET (server-
# only key — never commit it to the repo). Add it under Settings → Secrets and
# variables → Actions.

on:
  schedule:
    # 08:00 UTC daily (low traffic). Cron is UTC.
    - cron: "0 8 * * *"
  workflow_dispatch:
    # Manual "Run workflow" button, for on-demand top-ups. The backfill now runs on
    # every run automatically (see the Backfill step), so there's no input to tick.

# Don't let a slow run overlap the next day's run.
concurrency:
  group: catalog-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # grow + refresh + full backfill catch-up can run long; under GitHub's 360 ceiling
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger catalog sync
        env:
          BASE_URL: https://balasaur.com
          APIKEY: ${{ secrets.SYNC_HOOK_SECRET }}
        run: |
          if [ -z "$APIKEY" ]; then
            echo "::error::Missing repo secret SYNC_HOOK_SECRET"
            exit 1
          fi
          # Loop short passes instead of one long call the host would kill. bucket=i
          # rotates the provider-discovery region (9 passes = all 9 regions); each pass
          # also refreshes stale popular titles. ~9 × ~300 ≈ ~2.7k titles/day.
          # Derive the bucket from the day number so successive days CONTINUE the
          # rotation (72 region×provider combos → a full sweep every 8 days) instead
          # of re-running the same 9 combos every day.
          BASE=$(( $(date -u +%s) / 86400 * 9 ))
          total=0
          for i in $(seq 1 9); do
            bucket=$(( BASE + i ))
            echo "──────── sync pass $i/9 (bucket=$bucket) ────────"
            BODY=$(printf '{"bucket":%d,"refreshExisting":true}' "$bucket")
            HTTP=000
            for attempt in 1 2 3 4; do
              HTTP=$(curl -sS -o /tmp/sync.json -w "%{http_code}" \
                -X POST "$BASE_URL/api/public/hooks/sync-media" \
                -H "apikey: $APIKEY" -H "Content-Type: application/json" \
                --max-time 300 -d "$BODY" || echo 000)
              [ "$HTTP" = "200" ] && break
              echo "pass $i attempt $attempt: HTTP $HTTP"; cat /tmp/sync.json 2>/dev/null; echo
              case "$HTTP" in 502 | 503 | 504 | 429 | 000) ;; *) break ;; esac
              backoff=$((attempt * attempt * 5)); echo "retrying in ${backoff}s…"; sleep "$backoff"
            done
            echo "HTTP $HTTP"; echo "Response:"; cat /tmp/sync.json; echo
            if [ "$HTTP" != "200" ]; then
              echo "::error::Sync pass $i failed with HTTP $HTTP (after retries)"
              exit 1
            fi
            refreshed=$(jq -r '.refreshed // 0' /tmp/sync.json 2>/dev/null || echo 0)
            case "$refreshed" in '' | *[!0-9]*) refreshed=0 ;; esac
            total=$((total + refreshed))
            echo "pass $i: refreshed=$refreshed (cumulative=$total)"
            sleep 3
          done
          echo "Daily sync complete. Total titles enriched: $total"

      - name: Long-tail refresh (stalest titles, table-wide)
        env:
          BASE_URL: https://balasaur.com
          APIKEY: ${{ secrets.SYNC_HOOK_SECRET }}
        run: |
          # After the grow/popular passes above, refresh the STALEST titles table-wide
          # so the obscure long tail (which discovery never re-surfaces) also stays
          # current. The grow passes just bumped popular titles to fresh, so the oldest
          # rows are now the obscure ones — exactly what we want. ~5 passes ≈ 1.5k/day.
          for i in $(seq 1 5); do
            echo "──────── refresh pass $i/5 ────────"
            HTTP=000
            for attempt in 1 2 3 4; do
              HTTP=$(curl -sS -o /tmp/refresh.json -w "%{http_code}" \
                -X POST "$BASE_URL/api/public/hooks/sync-media" \
                -H "apikey: $APIKEY" -H "Content-Type: application/json" \
                --max-time 300 -d '{"mode":"refresh"}' || echo 000)
              [ "$HTTP" = "200" ] && break
              echo "pass $i attempt $attempt: HTTP $HTTP"; cat /tmp/refresh.json 2>/dev/null; echo
              case "$HTTP" in 502 | 503 | 504 | 429 | 000) ;; *) break ;; esac
              backoff=$((attempt * attempt * 5)); echo "retrying in ${backoff}s…"; sleep "$backoff"
            done
            echo "HTTP $HTTP"; echo "Response:"; cat /tmp/refresh.json; echo
            if [ "$HTTP" != "200" ]; then
              # Stopgap (2026-06): the table-wide "stalest titles" query times out
              # (HTTP 500: "canceling statement due to statement timeout") as the
              # catalog grows, which was hard-failing the whole nightly run even
              # though the grow passes above had already succeeded. Until the refresh
              # path is redesigned, treat a failed refresh as a non-fatal warning so
              # new titles keep flowing and the run stays green. Auth/endpoint outages
              # are still caught by the grow step above, which exits 1 on any non-200.
              echo "::warning::Long-tail refresh pass $i returned HTTP $HTTP — skipping remaining refresh for this run (known stalest-query timeout; grow passes already succeeded)."
              break
            fi
            refreshed=$(jq -r '.refreshed // 0' /tmp/refresh.json 2>/dev/null || echo 0)
            case "$refreshed" in '' | *[!0-9]*) refreshed=0 ;; esac
            echo "refresh pass $i: refreshed=$refreshed"
            [ "$refreshed" -eq 0 ] && { echo "Nothing left to refresh."; break; }
            sleep 3
          done

      - name: Backfill facets + derivations (automatic, resumable)
        env:
          BASE_URL: https://balasaur.com
          APIKEY: ${{ secrets.SYNC_HOOK_SECRET }}
        run: |
          # Re-derive genres/origins/streaming/awards + the advanced-filter facets
          # (sub-genres, themes, audience, film length, series status) from already-stored
          # raw_tmdb/raw_omdb — NO external API calls. Runs on EVERY nightly run so facet
          # coverage tops up with zero manual clicks (new titles are tagged at ingest; this
          # catches the historical long tail and re-derives when the taxonomy changes).
          #
          # Resumable: each call rewrites rows for ~90s then returns a lastId cursor + done
          # flag; we thread lastId back as `after`, so one run walks the whole catalog via
          # many short calls (none long enough to hit a host/statement timeout). skip-unchanged
          # makes converged runs cheap (no rewrites). A stuck page (transient read timeout) is
          # retried, and any failure is a non-fatal warning — it resumes next run, and the
          # grow passes above already succeeded.
          AFTER=""
          stuck=0
          for i in $(seq 1 200); do
            echo "──────── backfill pass $i (after='${AFTER}') ────────"
            BODY=$(jq -nc --arg a "$AFTER" '{after:$a, onlyMissing:true}')
            HTTP=000
            for attempt in 1 2 3 4; do
              HTTP=$(curl -sS -o /tmp/bf.json -w "%{http_code}" \
                -X POST "$BASE_URL/api/public/hooks/backfill-media" \
                -H "apikey: $APIKEY" -H "Content-Type: application/json" \
                --max-time 150 -d "$BODY" || echo 000)
              [ "$HTTP" = "200" ] && break
              echo "pass $i attempt $attempt: HTTP $HTTP"; cat /tmp/bf.json 2>/dev/null; echo
              case "$HTTP" in 502 | 503 | 504 | 429 | 000) ;; *) break ;; esac
              backoff=$((attempt * attempt * 5)); echo "retrying in ${backoff}s…"; sleep "$backoff"
            done
            if [ "$HTTP" != "200" ]; then
              echo "::warning::Backfill pass $i returned HTTP $HTTP — stopping backfill for this run (non-fatal; resumes next run)."
              break
            fi
            echo "$(jq -c '{scanned,stamped,updatedFacets,updatedGenres,updatedStreaming,updatedAwards,failed,done,lastId}' /tmp/bf.json 2>/dev/null || cat /tmp/bf.json)"
            DONE=$(jq -r '.done // false' /tmp/bf.json 2>/dev/null || echo false)
            NEXT=$(jq -r '.lastId // empty' /tmp/bf.json 2>/dev/null || true)
            if [ "$DONE" = "true" ]; then echo "✅ Backfill complete after pass $i."; break; fi
            if [ -z "$NEXT" ]; then echo "No cursor returned — stopping at pass $i."; break; fi
            # Cursor didn't advance: usually a transient blip. Retry the SAME cursor a few
            # times before giving up, so one hiccup can't end the whole run.
            if [ "$NEXT" = "$AFTER" ]; then
              stuck=$((stuck + 1))
              if [ "$stuck" -ge 10 ]; then
                echo "::warning::Stuck at '${AFTER}' for $stuck passes — stopping backfill."; break
              fi
              echo "No advance (stuck $stuck/10) — retrying same cursor…"; sleep $((stuck * 5)); continue
            fi
            stuck=0; AFTER="$NEXT"; sleep 2
          done
